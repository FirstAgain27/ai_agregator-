services:
  db:
    image: postgres:17
    container_name: postgres_db
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env.docker
    container_name: agregator_app
    ports: 
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: {}